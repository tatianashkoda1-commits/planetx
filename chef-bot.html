<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дежурный шеф — Планета X</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #10101A;
    color: #E2E8F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .stars {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, rgba(59,130,246,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 40%, rgba(96,165,250,0.25) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 75%, rgba(96,165,250,0.35) 0%, transparent 100%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 600px; width: 100%; margin: 0 auto;
    display: flex; flex-direction: column;
    height: 100vh; max-height: 100vh;
  }

  header {
    padding: 12px 16px;
    background: rgba(16, 16, 26, 0.95);
    border-bottom: 1px solid rgba(59,130,246,0.15);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }

  .chef-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #F5A623, #D97706);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    position: relative;
  }

  .chef-avatar .online {
    position: absolute; bottom: 0; right: 0;
    width: 12px; height: 12px; border-radius: 50%;
    background: #22C55E; border: 2px solid #10101A;
  }

  .chef-info { flex: 1; }
  .chef-name { font-size: 14px; font-weight: 700; }
  .chef-status { font-size: 11px; color: #22C55E; }

  .logo-small { font-size: 10px; color: #3B82F6; font-weight: 800; letter-spacing: 2px; }

  /* Chat area */
  .chat {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: #2A2A3A; border-radius: 4px; }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.5;
    animation: fadeIn 0.3s;
  }

  .msg-bot {
    align-self: flex-start;
    background: rgba(30, 30, 50, 0.8);
    border: 1px solid rgba(59,130,246,0.15);
    border-bottom-left-radius: 4px;
  }

  .msg-user {
    align-self: flex-end;
    background: linear-gradient(135deg, #3B82F6, #2563EB);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-bot .msg-name {
    font-size: 10px; color: #F5A623; font-weight: 700;
    margin-bottom: 4px;
  }

  .msg-bot .msg-text a {
    color: #3B82F6; text-decoration: none;
  }
  .msg-bot .msg-text a:hover { text-decoration: underline; }

  .typing {
    align-self: flex-start;
    padding: 10px 14px;
    background: rgba(30, 30, 50, 0.6);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    font-size: 13px; color: #94A3B8;
    display: none;
  }

  .typing.visible { display: block; }
  .typing-dots { display: inline-block; }
  .typing-dots span {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: #94A3B8; margin: 0 1px;
    animation: dotPulse 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Quick questions */
  .quick {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 16px; margin-bottom: 8px;
    flex-shrink: 0;
  }

  .quick-btn {
    padding: 6px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; font-family: inherit;
    cursor: pointer; border: 1px solid #2A2A3A;
    background: #1A1A2A; color: #94A3B8; transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-btn:hover { border-color: #F5A623; color: #F5A623; }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    background: rgba(16, 16, 26, 0.95);
    border-top: 1px solid rgba(59,130,246,0.15);
    display: flex; gap: 8px;
    flex-shrink: 0;
  }

  .input-area input {
    flex: 1; padding: 10px 14px; border-radius: 24px;
    background: #1A1A2A; border: 1px solid #2A2A3A;
    color: #E2E8F0; font-size: 13px; font-family: inherit;
    outline: none;
  }
  .input-area input:focus { border-color: #3B82F6; }
  .input-area input::placeholder { color: #4A5568; }

  .btn-send {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #F5A623, #D97706);
    border: none; color: #10101A; font-size: 18px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: all 0.2s;
  }
  .btn-send:hover { transform: scale(1.05); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 500px) {
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>

<div class="stars"></div>

<div class="container">
  <header>
    <div class="chef-avatar">
      👨‍🍳
      <div class="online"></div>
    </div>
    <div class="chef-info">
      <div class="chef-name">Дежурный шеф</div>
      <div class="chef-status">Онлайн · Планета X</div>
    </div>
    <div class="logo-small">ПЛАНЕТА X</div>
  </header>

  <div class="chat" id="chat">
    <div class="msg msg-bot">
      <div class="msg-name">👨‍🍳 Дежурный шеф</div>
      <div class="msg-text">Привет! Я дежурный шеф Планеты X. Спросите меня о чём угодно — готовка, продукты, заморозка, хранение, техника. Подскажу!</div>
    </div>
  </div>

  <div class="typing" id="typing">
    <div class="typing-dots"><span></span><span></span><span></span></div> Шеф печатает...
  </div>

  <div class="quick" id="quick">
    <button class="quick-btn" onclick="askQuick(this)">Чем заменить сливки?</button>
    <button class="quick-btn" onclick="askQuick(this)">Как загустить соус?</button>
    <button class="quick-btn" onclick="askQuick(this)">Сколько варить свёклу?</button>
    <button class="quick-btn" onclick="askQuick(this)">Как заморозить бульон?</button>
    <button class="quick-btn" onclick="askQuick(this)">Как разморозить мясо?</button>
    <button class="quick-btn" onclick="askQuick(this)">Что приготовить быстро?</button>
  </div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Спросите шефа..." maxlength="200" onkeydown="if(event.key==='Enter')send()">
    <button class="btn-send" onclick="send()">➤</button>
  </div>
</div>

<script>
const qa = [
  // === ЗАМЕНЫ ПРОДУКТОВ ===
  { keys: ['заменить сливки', 'замена сливк', 'нет сливок', 'без сливок', 'вместо сливок'],
    answer: 'Сливки можно заменить:\n• Молоко + сливочное масло (на 200 мл: 170 мл молока + 30 г масла)\n• Сметана, разведённая молоком 1:1\n• Кокосовые сливки (для безлактозных блюд)\n• Плавленый сыр + немного молока (для соусов)' },
  { keys: ['заменить яйц', 'замена яиц', 'нет яиц', 'без яиц', 'вместо яиц'],
    answer: 'Замена 1 яйца:\n• В выпечке: 1 банан (размять) или 3 ст.л. яблочного пюре\n• Для связки: 1 ст.л. крахмала + 3 ст.л. воды\n• В котлетах: 2 ст.л. сметаны или 1 ст.л. манки\n• Для пышности: 1 ч.л. соды + 1 ст.л. уксуса' },
  { keys: ['заменить масло сливочное', 'нет сливочного масла', 'вместо масла'],
    answer: 'Сливочное масло можно заменить:\n• Растительное масло (берите 80% от количества сливочного)\n• Кокосовое масло 1:1\n• В выпечке: банан или авокадо (для влажной текстуры)\n• Маргарин (но вкус будет отличаться)' },
  { keys: ['заменить муку', 'без муки', 'вместо муки', 'нет муки'],
    answer: 'Замена пшеничной муки:\n• Для загущения соусов: крахмал (кукурузный/картофельный) — берите вдвое меньше\n• В котлетах: манка или овсяные хлопья (перемолоть)\n• В выпечке: миндальная, рисовая, кукурузная мука\n• В панировке: сухари, кукурузные хлопья' },
  { keys: ['заменить сметан', 'нет сметаны', 'вместо сметаны'],
    answer: 'Сметану заменяют:\n• Натуральный йогурт (густой, без добавок)\n• Сливки + несколько капель лимонного сока\n• Мягкий творог, протёртый через сито\n• В выпечке: кефир или простокваша' },

  // === ВРЕМЯ ВАРКИ ===
  { keys: ['варить свёкл', 'сколько свёкл', 'время свёкл'],
    answer: 'Свёкла:\n• Целиком в кастрюле: 40–60 мин (зависит от размера)\n• Нарезанная кубиками: 20–30 мин\n• В духовке в фольге: 60–90 мин при 200°C (самая вкусная!)\n• В микроволновке: 10–15 мин\n• Лайфхак: не срезайте хвостик — свёкла сохранит цвет' },
  { keys: ['варить яйц', 'сколько яйц', 'время яиц'],
    answer: 'Яйца (от момента закипания):\n• Всмятку: 3–4 мин\n• В мешочек: 5–6 мин\n• Вкрутую: 8–10 мин\n• Лайфхак: после варки сразу в холодную воду — легко чистятся\n• Свежие яйца чистятся хуже — используйте те, что полежали 5–7 дней' },
  { keys: ['варить картошк', 'сколько картошк', 'варить картофел'],
    answer: 'Картофель:\n• Целиком в мундире: 25–30 мин\n• Нарезанный кубиками: 15–20 мин\n• Для пюре: варить до готовности (нож входит легко), ~25 мин\n• Проверка: проткните ножом — если легко входит, готово\n• Солить в начале варки, а не в конце!' },
  { keys: ['варить рис', 'сколько рис', 'время рис', 'приготовить рис', 'рассыпчатый рис'],
    answer: 'Рассыпчатый рис:\n• Промыть 3–4 раза до прозрачной воды\n• Залить водой 1:1.5 (1 стакан риса, 1.5 воды)\n• Довести до кипения, убавить на минимум\n• Накрыть крышкой, НЕ МЕШАТЬ\n• 15 мин, выключить, дать постоять ещё 10 мин\n• Рис будет идеальный!' },
  { keys: ['варить гречк', 'сколько гречк', 'приготовить гречк'],
    answer: 'Гречка:\n• Промыть, залить водой 1:2 (1 стакан гречки, 2 воды)\n• Довести до кипения, посолить\n• Убавить на минимум, накрыть крышкой\n• 15–20 мин, НЕ МЕШАТЬ\n• Выключить, добавить масло, дать постоять 5 мин\n• Для рассыпчатой: можно предварительно обжарить на сухой сковороде 3 мин' },
  { keys: ['варить макарон', 'варить паст', 'сколько макарон', 'сколько паст'],
    answer: 'Паста/макароны:\n• Большая кастрюля, МНОГО воды (1 л на 100 г пасты)\n• Посолить ПОСЛЕ закипания (10 г соли на 1 л)\n• Спагетти: 7–9 мин, перья: 10–12, рожки: 8–10\n• Al dente (с лёгким хрустом) — минус 1–2 мин от времени на упаковке\n• НЕ промывать после! (исключение — для салатов)' },

  // === ЗАМОРОЗКА ===
  { keys: ['заморозить бульон', 'заморозка бульон', 'хранить бульон'],
    answer: 'Бульон замораживать — обязательно!\n• Остудить полностью (сначала до комнатной, потом в холодильник)\n• Разлить порционно: контейнеры 500 мл или зип-пакеты (плоскими плитками!)\n• Плоские плитки размораживаются в 3 раза быстрее\n• Хранение: 4–6 месяцев\n• Можно в формочках для льда — получатся кубики для соусов и ризотто' },
  { keys: ['разморозить мяс', 'размораживать мяс', 'разморозка мяс'],
    answer: 'Правильная разморозка мяса:\n• Лучший способ: в холодильнике 8–12 часов (поставить вечером на утро)\n• Быстрый: в холодной воде в пакете (2–3 часа, менять воду каждые 30 мин)\n• Аварийный: микроволновка, режим «разморозка»\n\n❌ НЕ при комнатной температуре — бактерии!\n❌ НЕ в горячей воде — мясо сварится снаружи' },
  { keys: ['заморозить зелень', 'заморозка зелень', 'хранить зелень'],
    answer: 'Зелень замораживается отлично!\n• Нарезать, разложить по зип-пакетам — хранится 6 мес\n• В формочках для льда + оливковое масло — кубики для готовки\n• В формочках + вода — для супов\n• Не размораживая, бросать в горячее блюдо\n• Укроп, петрушка, кинза, зелёный лук — всё подходит\n• Базилик лучше в масле (темнеет без него)' },
  { keys: ['заморозить', 'можно ли заморозить', 'что заморозить', 'что можно заморозить'],
    answer: 'Замораживается отлично:\n✅ Мясо, рыба, фарш, котлеты, тефтели\n✅ Бульоны, соусы, заправки\n✅ Тесто, блинчики, пельмени, вареники\n✅ Ягоды, зелень, овощные нарезки\n✅ Песто (в формочках для льда)\n\nНельзя:\n❌ Огурцы, салат, редис (слишком водянистые)\n❌ Сметану, йогурт (расслоятся)\n❌ Варёные яйца (белок станет резиновым)\n❌ Жареную картошку (размякнет)' },
  { keys: ['срок хранения', 'сколько хранить', 'сколько лежит в морозилке'],
    answer: 'Сроки хранения в морозилке (-18°C):\n• Мясо сырое: 6 мес (в вакууме до 12)\n• Курица: 6 мес\n• Рыба: 3–4 мес\n• Фарш: 3 мес\n• Котлеты готовые: 3 мес\n• Бульон: 4–6 мес\n• Соусы: 3 мес\n• Тесто: 3 мес\n• Ягоды: 8–10 мес\n• Зелень: 6 мес\n\n💡 Всегда подписывайте дату заморозки!' },

  // === ТЕХНИКА ГОТОВКИ ===
  { keys: ['загустить соус', 'густой соус', 'жидкий соус', 'соус жидкий'],
    answer: 'Как загустить соус — 5 способов:\n1. Мука: 1 ст.л. муки развести в 50 мл холодной воды, влить помешивая\n2. Крахмал: 1 ч.л. + 2 ст.л. холодной воды (загустит за 1 мин)\n3. Сливочный сыр / сливки — добавить в конце\n4. Выпаривание: просто варите дольше без крышки\n5. Тёртый сыр — тает и загущает\n\n💡 Крахмал — самый быстрый способ!' },
  { keys: ['пересолила', 'пересолил', 'слишком солёный', 'много соли'],
    answer: 'Пересолили? Не паника!\n• Суп: добавить воды/бульона, или целую картофелину (варить 15 мин, вынуть)\n• Мясо: подать с несолёным гарниром (рис, пюре)\n• Соус: добавить сливки, молоко или сметану\n• Салат: добавить больше овощей и масла\n• Каша: добавить воды и масла\n\n💡 Лучше солить понемногу и пробовать!' },
  { keys: ['температур', 'градус', 'духовк', 'сколько градусов'],
    answer: 'Шпаргалка по температурам духовки:\n• 150–160°C: медленное томление, безе, сушка\n• 170–180°C: выпечка (пироги, кексы, печенье)\n• 190–200°C: мясо, рыба, запеканки\n• 210–220°C: пицца, хлеб, быстрое запекание\n• 230–250°C: очень быстрая корочка\n\nТемпература внутри мяса:\n• Курица: 75°C (обязательно!)\n• Говядина rare: 50°C, medium: 60°C, well: 70°C\n• Свинина: 65–70°C' },
  { keys: ['не прилипа', 'прилипает', 'пригорает', 'пригора'],
    answer: 'Чтобы еда не прилипала:\n• Сковороду СНАЧАЛА разогреть, ПОТОМ масло, ПОТОМ еду\n• Мясо должно быть СУХИМ (промокнуть бумажным полотенцем)\n• Не двигайте мясо первые 2–3 мин — пусть образуется корочка\n• Не перегружайте сковороду — если тесно, еда тушится вместо жарки\n• Антипригарная сковорода + минимум масла = лёгкая жизнь' },
  { keys: ['сочное мяс', 'сухое мяс', 'мясо сочн', 'мясо сухое', 'пересушила мяс'],
    answer: 'Как сделать мясо сочным:\n• Не жарьте из холодильника — дайте полежать 20 мин при комнатной\n• Промокните насухо перед жаркой\n• Сильный огонь для корочки (2 мин/сторону), потом средний\n• НЕ ПРОКАЛЫВАЙТЕ вилкой — сок вытечет! Используйте лопатку\n• После жарки дайте отдохнуть 5 мин под фольгой\n• Маринад с маслом + кислотой (лимон/уксус) = нежное мясо' },

  // === БЫСТРЫЕ РЕЦЕПТЫ ===
  { keys: ['быстр', 'что приготовить', 'ничего нет', 'быстрый ужин', 'быстрый рецепт', '15 минут', '10 минут'],
    answer: 'Ужин за 15 минут:\n🍳 Омлет с сыром и зеленью — 5 мин\n🍝 Паста с маслом, чесноком и пармезаном — 12 мин\n🥚 Яичница с помидорами и хлебом — 7 мин\n🌯 Лаваш + всё что есть в холодильнике = шаурма — 10 мин\n🍲 Суп из замороженного бульона + клёцки — 10 мин\n\n💡 А ещё у нас есть конструктор «Мой холодильник» — выбираете продукты и получаете рецепты!' },
  { keys: ['завтрак', 'на завтрак', 'что на завтрак'],
    answer: 'Идеи для завтрака:\n• Овсянка с ягодами и мёдом — 5 мин\n• Сырники (из морозилки!) — разогреть 3 мин\n• Яичница / омлет с овощами — 7 мин\n• Тосты с авокадо и яйцом — 5 мин\n• Блинчики (из морозилки!) — на сковороду 4 мин\n• Гранола с йогуртом — 2 мин\n\n💡 Совет: заготовьте сырники и блинчики заранее — утром только разогреть!' },

  // === MEAL PREP ===
  { keys: ['meal prep', 'мил преп', 'заготовки', 'готовить на неделю', 'еда на неделю'],
    answer: 'Meal prep — моя любимая тема!\n\nФормула: БЕЛОК + ГАРНИР + СОУС\n\nЗа 2–3 часа в выходные:\n• 3 вида мяса (котлеты + тефтели + филе в маринаде)\n• 3 гарнира (рис + пюре + овощная смесь)\n• 2 соуса (томатный + грибной)\n\n= 20+ комбинаций ужинов на 2 недели!\n\n💡 В нашем марафоне «Конструктор ужинов» мы делаем ровно это — за 7 дней заполняем морозилку!' },

  // === ПРОДУКТЫ ===
  { keys: ['выбрать мяс', 'как выбрать', 'свежее мяс', 'качество мяс'],

    answer: 'Привет! 👋 Рад вас видеть на Планете X! Я дежурный шеф — спрашивайте что угодно про готовку, продукты, заморозку, хранение. Чем помочь?' },

// Default off-topic responses
const offTopic = [

  'Хм, это не моя специализация — я разбираюсь в кастрюлях, а не в этом 😄 Спросите меня про готовку!',
  'Интересный вопрос, но мне бы про соусы и стейки 🍳 Чем могу помочь на кухне?',
  'Я только по кулинарной части! Зато тут я — эксперт. Что приготовить? Как заморозить? Спрашивайте!',
  'Это за пределами моей кухни 😄 Но если вопрос про еду — я весь внимание!',

// Fallback cooking tips
const randomTips = [
  'Хм, не совсем понял вопрос. Попробуйте перефразировать!\n\n💡 А вот вам совет: солите пасту ПОСЛЕ закипания воды, а не до.',

  'Не уверен, что понял. Спросите, например: «чем заменить сливки» или «сколько варить рис».\n\n💡 Совет: храните имбирь в морозилке — натирать проще, и не портится месяцами!',
];

function findAnswer(text) {
  const lower = text.toLowerCase().replace(/[?!.,;:]/g, '');

  // Check if off-topic
  const cookingWords = ['готов','варить','жарить','тушить','запекать','заморозить','разморозить','соус','суп','мясо','рыба','курица','овощ','тесто','хлеб','выпечка','рецепт','блюдо','ужин','завтрак','обед','продукт','масло','мука','яйц','крупа','рис','гречка','картош','макарон','паст','сковород','духовк','кастрюл','нож','температур','градус','замен','хранить','срок','калори','кбжу','белок','заготов','meal','prep','морозил','холодильник','привет','здравствуй','добр','спасибо','клуб','подписка','тариф','пересол','прилип','пригора','загуст','сочн','быстр'];

  const hasCookingWord = cookingWords.some(w => lower.includes(w));

  if (!hasCookingWord && lower.length > 10) {
    return offTopic[Math.floor(Math.random() * offTopic.length)];
  }

  // Find best match
  let bestMatch = null;
  let bestScore = 0;

  for (const item of qa) {
    for (const key of item.keys) {
      if (lower.includes(key.toLowerCase())) {
        const score = key.length;
        if (score > bestScore) {
          bestScore = score;
          bestMatch = item.answer;
        }
      }
    }
  }

  if (bestMatch) return bestMatch;

  return randomTips[Math.floor(Math.random() * randomTips.length)];
}

function addMessage(text, isUser) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg ' + (isUser ? 'msg-user' : 'msg-bot');

  if (isUser) {
    msg.innerHTML = `<div class="msg-text">${text}</div>`;
  } else {
    msg.innerHTML = `<div class="msg-name">👨‍🍳 Дежурный шеф</div><div class="msg-text">${text.replace(/\n/g, '<br>')}</div>`;
  }

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, true);
  input.value = '';

  // Show typing
  const typing = document.getElementById('typing');
  typing.classList.add('visible');

  const delay = 800 + Math.random() * 1200;
  setTimeout(() => {
    typing.classList.remove('visible');
    const answer = findAnswer(text);
    addMessage(answer, false);

    // Update quick questions after first message
    updateQuickQuestions();
  }, delay);
}

function askQuick(btn) {
  document.getElementById('user-input').value = btn.textContent;
  send();
}

function updateQuickQuestions() {
  const questions = [
    'Чем заменить яйца?', 'Как сделать мясо сочным?',
    'Сколько варить рис?', 'Что приготовить на ужин?',
    'Как выбрать свежее мясо?', 'Пересолила суп!',
    'Сколько варить макароны?', 'Чем заменить муку?',
    'Как правильно жарить?', 'Расскажи про meal prep',
    'Как хранить продукты?', 'Сколько варить яйца?',
    'Что можно заморозить?', 'Как заморозить зелень?',
    'Идеи для завтрака', 'Чем заменить сметану?',
  ];

  const shuffled = questions.sort(() => Math.random() - 0.5).slice(0, 6);
  const quick = document.getElementById('quick');
  quick.innerHTML = shuffled.map(q =>
    `<button class="quick-btn" onclick="askQuick(this)">${q}</button>`
  ).join('');
}
